<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마음 포춘쿠키 · 10일의 응원</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Gowun+Dodum&display=swap');

  :root{
    --bg-deep:#33241d; --bg-soft:#46312a;
    --cookie:#eebd75; --cookie-dark:#d99a4e; --cookie-edge:#b0762f;
    --paper:#fdf6e3; --ink:#4a3526; --apricot:#f2a65e; --cream:#f5e6c8;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Gowun Dodum','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:radial-gradient(ellipse at 50% 15%, var(--bg-soft) 0%, var(--bg-deep) 70%);
    color:var(--cream); min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    overflow-x:hidden; padding:30px 14px 60px;
  }
  header{text-align:center;}
  h1{font-family:'Gowun Batang',serif;font-size:clamp(1.6rem,4.5vw,2.4rem);font-weight:700;letter-spacing:.05em;}
  h1 span{color:var(--apricot);}
  .subtitle{margin-top:10px;font-size:.92rem;color:#d8c4a8;line-height:1.6;word-break:keep-all;}
  .meta{margin-top:8px;font-size:.78rem;color:#a98f74;}
  .meta button{background:none;border:none;color:#c9ae8d;text-decoration:underline;cursor:pointer;font:inherit;}

  /* 이름 입력 */
  .name-row{margin-top:16px;display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;}
  .name-row label{font-size:.85rem;color:#d8c4a8;}
  .name-row input{
    font-family:inherit;font-size:.95rem;color:var(--cream);
    background:rgba(245,230,200,.08);border:1px solid rgba(245,230,200,.3);
    border-radius:999px;padding:8px 16px;width:150px;text-align:center;outline:none;
  }
  .name-row input:focus{border-color:var(--apricot);}

  /* 10일 접시 */
  .plate{
    margin-top:26px;display:grid;
    grid-template-columns:repeat(5,minmax(60px,110px));
    gap:clamp(8px,2.5vw,20px);justify-content:center;
  }
  @media (max-width:480px){.plate{grid-template-columns:repeat(3,minmax(88px,110px));}}
  .cookie-btn{
    position:relative;background:none;border:none;cursor:pointer;
    padding:4px;border-radius:16px;
    transition:transform .25s ease, filter .25s ease;
    animation:bob 3.4s ease-in-out infinite;
  }
  .cookie-btn:nth-child(2n){animation-delay:-1.3s;}
  .cookie-btn:nth-child(3n){animation-delay:-2.2s;}
  .cookie-btn svg{width:100%;height:auto;display:block;}
  .cookie-btn .day{
    position:absolute;top:2px;left:50%;transform:translateX(-50%);
    font-size:.72rem;letter-spacing:.12em;color:#c9ae8d;
  }
  .cookie-btn .badge{
    position:absolute;bottom:6px;left:50%;transform:translateX(-50%);
    font-size:1rem;filter:drop-shadow(0 2px 3px rgba(0,0,0,.4));
  }
  .cookie-btn:not(.locked):hover,.cookie-btn:not(.locked):focus-visible{
    transform:translateY(-6px) scale(1.07);
    filter:drop-shadow(0 10px 14px rgba(0,0,0,.45)) brightness(1.08);
  }
  .cookie-btn:focus-visible{outline:2px dashed var(--apricot);outline-offset:3px;}
  .cookie-btn.locked{cursor:not-allowed;animation:none;filter:grayscale(.85) brightness(.55);}
  .cookie-btn.opened{animation:none;filter:saturate(.6) brightness(.8);}
  .cookie-btn.today:not(.opened){filter:drop-shadow(0 0 14px rgba(242,166,94,.55));}
  @keyframes bob{0%,100%{translate:0 0;}50%{translate:0 -5px;}}
  .plate.faded .cookie-btn{opacity:.15;pointer-events:none;animation:none;}

  .hint{margin-top:16px;font-size:.82rem;color:#b79a7b;text-align:center;line-height:1.6;word-break:keep-all;}

  /* 크랙 스테이지 */
  .stage{
    position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    background:rgba(38,25,19,.9);backdrop-filter:blur(4px);
    opacity:0;pointer-events:none;transition:opacity .35s ease;padding:16px;
  }
  .stage.show{opacity:1;pointer-events:auto;}
  .crack-wrap{position:relative;width:min(74vw,320px);}
  .crack-wrap svg{width:100%;height:auto;overflow:visible;}
  .trembling .whole{animation:tremble .09s linear infinite;}
  @keyframes tremble{
    0%{transform:translate(0,0) rotate(0);}
    25%{transform:translate(-3px,1px) rotate(-2.2deg);}
    50%{transform:translate(2px,-2px) rotate(1.8deg);}
    75%{transform:translate(-2px,2px) rotate(2.4deg);}
    100%{transform:translate(3px,-1px) rotate(-1.6deg);}
  }
  .half{transition:transform .9s cubic-bezier(.34,1.3,.5,1), opacity .9s ease;}
  .cracked .half-left{transform:translate(-46%,14%) rotate(-38deg);}
  .cracked .half-right{transform:translate(46%,18%) rotate(34deg);}
  .crumb{opacity:0;}
  .cracked .crumb{animation:crumbFall 1.1s ease-out forwards;}
  .cracked .crumb:nth-of-type(2){animation-delay:.05s;}
  .cracked .crumb:nth-of-type(3){animation-delay:.1s;}
  .cracked .crumb:nth-of-type(4){animation-delay:.15s;}
  @keyframes crumbFall{
    0%{opacity:1;transform:translate(0,0);}
    100%{opacity:0;transform:translate(var(--dx,10px),90px) rotate(120deg);}
  }

  /* 문구 카드 */
  .slip{
    position:absolute;left:50%;top:34%;
    transform:translate(-50%,-50%) scale(.1) rotate(-4deg);
    width:min(84vw,420px);background:var(--paper);color:var(--ink);
    border-radius:8px;padding:24px 26px 18px;
    box-shadow:0 14px 34px rgba(0,0,0,.5), inset 0 0 0 1px rgba(160,111,40,.25);
    opacity:0;text-align:center;
    transition:transform .8s cubic-bezier(.2,1.4,.4,1) .55s, opacity .5s ease .55s;
  }
  .slip::before,.slip::after{
    content:"";position:absolute;top:0;bottom:0;width:10px;
    background:repeating-linear-gradient(180deg,transparent 0 6px, rgba(160,111,40,.18) 6px 8px);
  }
  .slip::before{left:0;border-radius:8px 0 0 8px;}
  .slip::after{right:0;border-radius:0 8px 8px 0;}
  .cracked-stage .slip{opacity:1;transform:translate(-50%,-118%) scale(1) rotate(-2deg);}
  .slip .label{font-size:.7rem;letter-spacing:.28em;color:#b5834a;margin-bottom:10px;}
  .slip .message{
    font-family:'Gowun Batang',serif;font-weight:700;
    font-size:clamp(1rem,3.3vw,1.2rem);line-height:1.75;word-break:keep-all;
  }
  .slip .owner{
    margin-top:14px;padding-top:10px;border-top:1px dashed rgba(160,111,40,.35);
    font-size:.8rem;color:#8a6a45;letter-spacing:.05em;
  }

  .stage-buttons{
    margin-top:24vh;display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
    opacity:0;transition:opacity .5s ease 1.2s;pointer-events:none;
  }
  .cracked-stage .stage-buttons{opacity:1;pointer-events:auto;}
  .btn{
    font-family:inherit;font-size:.9rem;letter-spacing:.03em;
    padding:11px 20px;border-radius:999px;cursor:pointer;
    border:1px solid rgba(245,230,200,.35);
    background:rgba(245,230,200,.08);color:var(--cream);
    transition:background .2s ease, transform .2s ease;
  }
  .btn:hover{background:rgba(245,230,200,.18);transform:translateY(-2px);}
  .btn.primary{background:var(--apricot);border-color:var(--apricot);color:#3a2717;font-weight:700;}
  .btn.primary:hover{background:#f7b877;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:rgba(245,230,200,.95);color:#3a2717;font-size:.85rem;
    padding:10px 20px;border-radius:999px;box-shadow:0 6px 20px rgba(0,0,0,.4);
    opacity:0;pointer-events:none;transition:all .3s ease;z-index:50;word-break:keep-all;text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion:reduce){
    .cookie-btn{animation:none;}
    .trembling .whole{animation:none;}
    .half,.slip{transition-duration:.2s;}
  }
</style>
</head>
<body>

<header>
  <h1>마음 <span>포춘쿠키</span> · 10일의 응원</h1>
  <p class="subtitle">하루에 하나씩, 열흘 동안 나를 위한 한마디를 만나 보세요.<br>오늘의 쿠키만 열 수 있어요.</p>
  <p class="meta">
    시작일 <span id="startLabel"></span> ·
    <button id="resetBtn">처음부터 다시 시작</button> ·
    <button id="demoBtn">체험 모드</button>
  </p>
</header>

<div class="name-row">
  <label for="nameInput">내 이름</label>
  <input id="nameInput" type="text" maxlength="12" placeholder="예: 김하늘">
</div>

<div class="plate" id="plate"></div>
<p class="hint" id="hint"></p>

<div class="stage" id="stage" role="dialog" aria-modal="true" aria-label="포춘쿠키 결과">
  <div class="crack-wrap" id="crackWrap">
    <svg viewBox="-20 -20 240 180" aria-hidden="true">
      <defs>
        <linearGradient id="ck" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#f4c887"/><stop offset="1" stop-color="#d1913f"/>
        </linearGradient>
      </defs>
      <g class="whole" id="wholeCookie" style="transform-origin:100px 85px;">
        <path d="M38 150 C 16 122, 12 80, 30 52 C 42 30, 70 18, 100 18 C 130 18, 158 30, 170 52 C 188 80, 184 122, 162 150 C 142 130, 122 112, 100 102 C 78 112, 58 130, 38 150 Z"
              fill="url(#ck)" stroke="var(--cookie-edge)" stroke-width="3" stroke-linejoin="round"/>
        <path d="M100 102 C 96 120, 90 134, 82 142 C 76 147, 69 143, 72 135 C 79 124, 86 112, 91 103 Z"
              fill="rgba(150,95,35,.55)" stroke="var(--cookie-edge)" stroke-width="2" stroke-linejoin="round"/>
        <path d="M100 102 C 122 112, 142 130, 162 150 C 144 134, 124 119, 104 108 Z" fill="rgba(120,72,25,.4)"/>
        <ellipse cx="62" cy="52" rx="17" ry="9" fill="rgba(255,238,205,.5)" transform="rotate(-32 62 52)"/>
      </g>
      <g class="half half-left" id="halfL" style="transform-origin:100px 85px;opacity:0;">
        <path d="M100 18 C 70 18, 42 30, 30 52 C 12 80, 16 122, 38 150 C 58 130, 78 112, 100 102 L 89 88 L 105 72 L 91 52 L 103 34 L 100 18 Z"
              fill="url(#ck)" stroke="var(--cookie-edge)" stroke-width="3" stroke-linejoin="round"/>
        <ellipse cx="62" cy="52" rx="17" ry="9" fill="rgba(255,238,205,.5)" transform="rotate(-32 62 52)"/>
      </g>
      <g class="half half-right" id="halfR" style="transform-origin:100px 85px;opacity:0;">
        <path d="M100 18 C 130 18, 158 30, 170 52 C 188 80, 184 122, 162 150 C 142 130, 122 112, 100 102 L 89 88 L 105 72 L 91 52 L 103 34 L 100 18 Z"
              fill="url(#ck)" stroke="var(--cookie-edge)" stroke-width="3" stroke-linejoin="round"/>
        <path d="M100 102 C 122 112, 142 130, 162 150 C 144 134, 124 119, 104 108 Z" fill="rgba(120,72,25,.4)"/>
      </g>
      <circle class="crumb" cx="95" cy="100" r="3" fill="var(--cookie-dark)" style="--dx:-22px"/>
      <circle class="crumb" cx="105" cy="96" r="2.4" fill="var(--cookie)" style="--dx:18px"/>
      <circle class="crumb" cx="99" cy="110" r="2" fill="var(--cookie-edge)" style="--dx:-8px"/>
      <circle class="crumb" cx="103" cy="106" r="2.8" fill="var(--cookie-dark)" style="--dx:28px"/>
    </svg>

    <div class="slip" id="slip">
      <div class="label" id="slipLabel">DAY 1 · 오늘의 한마디</div>
      <div class="message" id="msg"></div>
      <div class="owner" id="owner"></div>
    </div>
  </div>

  <div class="stage-buttons">
    <button class="btn primary" id="saveBtn">🖼 이미지로 저장</button>
    <button class="btn" id="shareBtn">📤 공유하기 (카톡 등)</button>
    <button class="btn" id="closeBtn">닫기</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<canvas id="cardCanvas" width="1080" height="1350" style="display:none"></canvas>

<script>
const MESSAGES = [
  "부모는 아이와 함께 더 나은 방향을 찾아가는 사람입니다.",
  "엄마는 아이의 특별함을 먼저 믿어주는 사람입니다.",
  "엄마는 아이가 돌아올 수 있는 자리를 지켜주는 사람입니다.",
  "아이가 사랑스러웠던 순간을 떠올려보세요. 오늘을 버틸 힘이 됩니다.",
  "아이를 위한 결정이 어려울 때, 원칙을 떠올려보세요.",
  "오늘 아이의 인생 드라마에서 당신은 어떤 배역이었나요? 응원합니다.",
  "엄마의 인생은 어느 한순간만으로 평가될 수 없습니다.",
  "아이의 인생에는 아이가, 엄마의 인생에는 엄마가 주인공입니다.",
  "아이의 작은 실패를 격려해 주세요. 결승점보다 성장의 길을 보세요.",
  "엄마가 자신을 사랑할 때, 아이도 더 편안해집니다.",
  "아이와 함께하는 시간은 영원하지 않아요. 그래서 오늘이 소중합니다.",
  "아이를 꼭 잡은 손의 힘을 조금 빼고, 나를 돌보세요.",
  "마음이 무거운 날에는 걸어보세요. 스스로에게 괜찮다고 말해주세요.",
  "불안이 찾아오면 그 마음을 바라보세요. 감사한 일을 떠올려보세요.",
  "부모가 좋은 선택만 대신해주면, 아이는 실패를 배울 기회를 잃습니다.",
  "엄마의 표정과 말투는 아이에게 오래 남는 교과서입니다.",
  "엄마가 감정을 잘 다루면, 아이는 마음의 힘을 배웁니다.",
  "이 가정의 시작에는 사랑이 있었습니다. 그 마음을 잊지 마세요.",
  "육아는 누구나 어려워요. 경험과 시간 속에서 조금씩 빛나게 됩니다.",
  "부모도 처음입니다. 갈등 해결도 연습하며 자랍니다.",
  "아이는 부모가 서로 대하는 방식을 보고 관계를 배웁니다.",
  "육아에도 청사진이 필요해요. 아이가 자라듯, 계획도 함께 수정하세요.",
  "나를 사랑하는 엄마가 아이에게도 사랑을 가르칠 수 있습니다.",
  "지친 엄마에게도 충전이 필요해요. 쉬어야 다시 시작할 수 있습니다.",
  "행복은 기성복이 아닙니다. 내 삶에 맞게 새로 지어 입는 맞춤복입니다.",
  "작은 것에서 기쁨을 찾는 힘이 오늘을 살게 합니다.",
  "엄마에게는 작은 기대도 아이에게는 큰 평가처럼 느껴질 수 있습니다.",
  "아이는 자기만의 작품을 만들어가요. 조급함보다 기다림이 필요해요.",
  "아이를 사랑하되, 아이만 집안의 주인공으로 세우지는 마세요.",
  "아이에게 단 일주일만 남았다면, 무엇을 꼭 가르치고 싶으신가요?"
];
const DAYS = 10;

/* ── 저장소 (사용 불가 환경에서는 메모리로 대체) ── */
const mem = {};
const store = {
  get(k){ try{ return localStorage.getItem(k); }catch(e){ return mem[k] ?? null; } },
  set(k,v){ try{ localStorage.setItem(k,v); }catch(e){ mem[k]=v; } }
};

/* ── 날짜 유틸 ── */
function todayStr(){
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDays(str, n){
  const [y,m,d] = str.split('-').map(Number);
  const dt = new Date(y, m-1, d+n);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function fmt(str){ const [y,m,d]=str.split('-'); return `${m}월 ${d}일`; }

/* ── 시드 셔플: 시작일이 같으면 10개의 문구도 항상 동일 ── */
function seedFromString(s){
  let h = 2166136261;
  for(let i=0;i<s.length;i++){ h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function dayMessages(startDate){
  const rnd = mulberry32(seedFromString(startDate));
  const arr = [...MESSAGES];
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(rnd()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr.slice(0, DAYS);
}

/* ── 상태 ── */
let startDate = store.get('fc_start');
if(!startDate){ startDate = todayStr(); store.set('fc_start', startDate); }
let opened = JSON.parse(store.get('fc_opened') || '{}');
let demoMode = false;
let msgs = dayMessages(startDate);
let currentDay = 0;
let animating = false;

const plate = document.getElementById('plate');
const hint = document.getElementById('hint');
const stage = document.getElementById('stage');
const crackWrap = document.getElementById('crackWrap');
const wholeCookie = document.getElementById('wholeCookie');
const halfL = document.getElementById('halfL');
const halfR = document.getElementById('halfR');
const slipLabel = document.getElementById('slipLabel');
const msgEl = document.getElementById('msg');
const ownerEl = document.getElementById('owner');
const nameInput = document.getElementById('nameInput');
const toast = document.getElementById('toast');
const canvas = document.getElementById('cardCanvas');

nameInput.value = store.get('fc_name') || '';
nameInput.addEventListener('input', ()=> store.set('fc_name', nameInput.value.trim()));
document.getElementById('startLabel').textContent = fmt(startDate);

const COOKIE_SVG = (id)=>`
<svg viewBox="0 0 200 175" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs><linearGradient id="g${id}" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#f4c887"/><stop offset="1" stop-color="#d1913f"/>
  </linearGradient></defs>
  <ellipse cx="100" cy="160" rx="58" ry="8" fill="rgba(0,0,0,.28)"/>
  <path d="M38 152 C 16 124, 12 82, 30 54 C 42 32, 70 20, 100 20 C 130 20, 158 32, 170 54 C 188 82, 184 124, 162 152 C 142 132, 122 114, 100 104 C 78 114, 58 132, 38 152 Z"
        fill="url(#g${id})" stroke="#b0762f" stroke-width="3" stroke-linejoin="round"/>
  <path d="M100 104 C 96 122, 90 136, 82 144 C 76 149, 69 145, 72 137 C 79 126, 86 114, 91 105 Z"
        fill="rgba(150,95,35,.55)" stroke="#b0762f" stroke-width="2" stroke-linejoin="round"/>
  <path d="M100 104 C 122 114, 142 132, 162 152 C 144 136, 124 121, 104 110 Z" fill="rgba(120,72,25,.4)"/>
  <ellipse cx="62" cy="54" rx="17" ry="9" fill="rgba(255,238,205,.5)" transform="rotate(-32 62 54)"/>
</svg>`;

function statusOf(i){
  if(opened[i]) return 'opened';
  if(demoMode) return 'today';
  const unlock = addDays(startDate, i);
  const t = todayStr();
  if(unlock > t) return 'locked';
  return 'today'; // 오늘이거나, 놓친 지난 날도 열 수 있음
}

function buildPlate(){
  plate.innerHTML = '';
  for(let i=0;i<DAYS;i++){
    const st = statusOf(i);
    const b = document.createElement('button');
    b.className = 'cookie-btn ' + st;
    b.innerHTML = `<span class="day">DAY ${i+1}</span>` + COOKIE_SVG(i) +
      `<span class="badge">${st==='locked' ? '🔒' : st==='opened' ? '✉️' : '✨'}</span>`;
    b.style.rotate = ((i*47)%14-7) + 'deg';
    if(st==='locked'){
      b.setAttribute('aria-label', `DAY ${i+1} — ${fmt(addDays(startDate,i))}에 열려요`);
      b.addEventListener('click', ()=> showToast(`이 쿠키는 ${fmt(addDays(startDate,i))}에 열 수 있어요 🍪`));
    }else{
      b.setAttribute('aria-label', `DAY ${i+1} 쿠키 ${st==='opened'?'다시 보기':'열기'}`);
      b.addEventListener('click', ()=> pick(i, st==='opened'));
    }
    plate.appendChild(b);
  }
  const openedCount = Object.keys(opened).length;
  hint.textContent = demoMode
    ? '체험 모드: 모든 날의 쿠키를 미리 열어볼 수 있어요. (열람 기록은 저장되지 않아요)'
    : openedCount >= DAYS
      ? '10일의 응원을 모두 만나셨어요. 수고 많으셨습니다 💛'
      : `지금까지 ${openedCount}개를 열었어요 · ✨ 표시된 쿠키를 눌러 보세요`;
}

function pick(dayIdx, alreadyOpened){
  if(animating) return;
  animating = true;
  currentDay = dayIdx;
  if(!demoMode && !alreadyOpened){
    opened[dayIdx] = true;
    store.set('fc_opened', JSON.stringify(opened));
  }
  plate.classList.add('faded');
  slipLabel.textContent = `DAY ${dayIdx+1} · ${fmt(addDays(startDate,dayIdx))}의 한마디`;
  msgEl.textContent = msgs[dayIdx];
  const nm = nameInput.value.trim();
  ownerEl.textContent = nm ? `${nm} 님에게, 마음 포춘쿠키가` : '마음 포춘쿠키가 당신에게';

  crackWrap.classList.remove('cracked','cracked-stage');
  stage.classList.remove('cracked-stage');
  wholeCookie.style.opacity = 1;
  halfL.style.opacity = 0; halfR.style.opacity = 0;

  stage.classList.add('show');
  crackWrap.classList.add('trembling');

  setTimeout(()=>{
    crackWrap.classList.remove('trembling');
    wholeCookie.style.opacity = 0;
    halfL.style.opacity = 1; halfR.style.opacity = 1;
    crackWrap.classList.add('cracked');
    requestAnimationFrame(()=>{
      crackWrap.classList.add('cracked-stage');
      stage.classList.add('cracked-stage');
    });
    setTimeout(()=>{ animating = false; }, 900);
  }, 1200);
}

function closeStage(){
  stage.classList.remove('show','cracked-stage');
  crackWrap.classList.remove('trembling','cracked','cracked-stage');
  plate.classList.remove('faded');
  buildPlate();
  animating = false;
}
document.getElementById('closeBtn').addEventListener('click', closeStage);
stage.addEventListener('click', e=>{ if(e.target===stage) closeStage(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape' && stage.classList.contains('show')) closeStage(); });

document.getElementById('resetBtn').addEventListener('click', ()=>{
  if(!confirm('열람 기록과 시작일을 지우고 오늘부터 다시 시작할까요?')) return;
  startDate = todayStr(); opened = {};
  store.set('fc_start', startDate);
  store.set('fc_opened', '{}');
  msgs = dayMessages(startDate);
  document.getElementById('startLabel').textContent = fmt(startDate);
  buildPlate();
  showToast('오늘부터 새로운 10일이 시작됐어요 🍪');
});
document.getElementById('demoBtn').addEventListener('click', ()=>{
  demoMode = !demoMode;
  document.getElementById('demoBtn').textContent = demoMode ? '체험 모드 끄기' : '체험 모드';
  buildPlate();
});

/* ── 이미지 카드 그리기 ── */
function wrapText(ctx, text, maxWidth){
  const words = text.split(' ');
  const lines = []; let line = '';
  for(const w of words){
    const test = line ? line + ' ' + w : w;
    if(ctx.measureText(test).width > maxWidth && line){ lines.push(line); line = w; }
    else line = test;
  }
  if(line) lines.push(line);
  return lines;
}
async function drawCard(){
  try{ await document.fonts.ready; }catch(e){}
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  // 배경
  const bg = ctx.createRadialGradient(W/2, H*0.2, 100, W/2, H*0.6, H);
  bg.addColorStop(0, '#46312a'); bg.addColorStop(1, '#33241d');
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  // 종이 카드
  const px=90, py=260, pw=W-180, ph=H-520, r=28;
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,.5)'; ctx.shadowBlur=60; ctx.shadowOffsetY=24;
  ctx.fillStyle='#fdf6e3';
  ctx.beginPath(); ctx.roundRect(px,py,pw,ph,r); ctx.fill();
  ctx.restore();
  ctx.strokeStyle='rgba(160,111,40,.35)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.roundRect(px+18,py+18,pw-36,ph-36,r-10); ctx.stroke();
  // 쿠키 그림 (상단)
  ctx.save(); ctx.translate(W/2, 168); ctx.scale(1.05,1.05);
  const g = ctx.createLinearGradient(0,-72,0,66);
  g.addColorStop(0,'#f4c887'); g.addColorStop(1,'#d1913f');
  ctx.fillStyle=g; ctx.strokeStyle='#b0762f'; ctx.lineWidth=5;
  ctx.beginPath();
  ctx.moveTo(-62,62);
  ctx.bezierCurveTo(-84,34,-88,-8,-70,-36);
  ctx.bezierCurveTo(-58,-58,-30,-70,0,-70);
  ctx.bezierCurveTo(30,-70,58,-58,70,-36);
  ctx.bezierCurveTo(88,-8,84,34,62,62);
  ctx.bezierCurveTo(42,42,22,24,0,14);
  ctx.bezierCurveTo(-22,24,-42,42,-62,62);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // 안쪽 접힌 자락
  ctx.fillStyle='rgba(150,95,35,.55)'; ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(0,14);
  ctx.bezierCurveTo(-4,32,-10,46,-18,54);
  ctx.bezierCurveTo(-24,59,-31,55,-28,47);
  ctx.bezierCurveTo(-21,36,-14,24,-9,15);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  // 오른쪽 안쪽 그림자
  ctx.fillStyle='rgba(120,72,25,.4)';
  ctx.beginPath();
  ctx.moveTo(0,14);
  ctx.bezierCurveTo(22,24,42,42,62,62);
  ctx.bezierCurveTo(44,46,24,31,4,20);
  ctx.closePath(); ctx.fill();
  ctx.restore();
  // 라벨
  ctx.textAlign='center';
  ctx.fillStyle='#b5834a';
  ctx.font='500 34px "Gowun Dodum", sans-serif';
  const dateStr = fmt(addDays(startDate,currentDay));
  ctx.fillText(`마음 포춘쿠키  ·  DAY ${currentDay+1}  ·  ${dateStr}`, W/2, py+130);
  // 본문
  ctx.fillStyle='#4a3526';
  ctx.font='700 56px "Gowun Batang", serif';
  const lines = wrapText(ctx, msgs[currentDay], pw-200);
  const lh = 96;
  const textBlockH = lines.length * lh;
  let ty = py + ph/2 - textBlockH/2 + 70;
  for(const ln of lines){ ctx.fillText(ln, W/2, ty); ty += lh; }
  // 점선
  ctx.strokeStyle='rgba(160,111,40,.4)'; ctx.setLineDash([10,10]); ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(px+120, py+ph-150); ctx.lineTo(px+pw-120, py+ph-150); ctx.stroke();
  ctx.setLineDash([]);
  // 이름
  const nm = nameInput.value.trim();
  ctx.fillStyle='#8a6a45';
  ctx.font='400 38px "Gowun Dodum", sans-serif';
  ctx.fillText(nm ? `${nm} 님의 오늘 한마디` : '오늘의 한마디', W/2, py+ph-85);
  // 푸터
  ctx.fillStyle='#c9ae8d';
  ctx.font='400 30px "Gowun Dodum", sans-serif';
  ctx.fillText('🍪 하루에 하나씩, 10일의 응원', W/2, H-90);
  return new Promise(res=> canvas.toBlob(res, 'image/png'));
}
function fileNameFor(){
  const nm = nameInput.value.trim();
  return `포춘쿠키_DAY${currentDay+1}${nm?'_'+nm:''}.png`;
}
document.getElementById('saveBtn').addEventListener('click', async ()=>{
  const blob = await drawCard();
  if(!blob){ showToast('이미지 생성에 실패했어요.'); return; }
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fileNameFor();
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 3000);
  showToast('이미지를 저장했어요. 갤러리(다운로드)에서 확인하세요 🖼');
});
document.getElementById('shareBtn').addEventListener('click', async ()=>{
  const text = `🍪 마음 포춘쿠키 DAY ${currentDay+1}\n"${msgs[currentDay]}"`;
  const blob = await drawCard();
  try{
    if(blob && navigator.canShare && navigator.canShare({files:[new File([blob], fileNameFor(), {type:'image/png'})]})){
      await navigator.share({
        files:[new File([blob], fileNameFor(), {type:'image/png'})],
        title:'마음 포춘쿠키', text
      });
      return;
    }
    if(navigator.share){ await navigator.share({title:'마음 포춘쿠키', text}); return; }
    await navigator.clipboard.writeText(text);
    showToast('문구를 복사했어요. 카톡 "나에게 보내기"에 붙여넣으세요 📋');
  }catch(e){
    if(e && e.name === 'AbortError') return;
    try{ await navigator.clipboard.writeText(text); showToast('문구를 복사했어요. 카톡에 붙여넣으세요 📋'); }
    catch(_){ showToast('이 환경에서는 공유가 지원되지 않아요. 이미지 저장을 이용해 주세요.'); }
  }
});

let toastTimer;
function showToast(t){
  toast.textContent = t;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>toast.classList.remove('show'), 2600);
}

buildPlate();
</script>
